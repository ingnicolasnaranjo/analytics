<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Series — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05070d;
  --surface: #0c101c;
  --surface2: #151a2e;
  --accent: #ff4d6d;
  --text: #f1f5ff;
  --muted: #8a93b2;
  --radius: 18px;
  --nav-h: 70px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg) radial-gradient(circle at 15px 15px,rgba(255,77,109,.15) 2px,transparent 2px);background-size:30px 30px;color:var(--text);min-height:100vh;}
button{font:inherit;cursor:default;}
*{scrollbar-width:thin;scrollbar-color:rgba(255,77,109,.28) rgba(255,255,255,.05);}
::-webkit-scrollbar{width:12px;height:12px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05);}
::-webkit-scrollbar-thumb{background:rgba(255,77,109,.28);border-radius:999px;border:3px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,77,109,.42);}
::-webkit-scrollbar-corner{background:transparent;}
nav{position:fixed;inset:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:var(--nav-h);background:rgba(7,10,18,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(232,201,126,.08);z-index:1000;}
.nav-left{display:flex;align-items:center;gap:24px;}
.nav-logo{display:inline-flex;align-items:center;gap:12px;padding:0;margin:0;border:none;background:transparent !important;box-shadow:none !important;appearance:none;-webkit-appearance:none;outline:none !important;cursor:default;transition:opacity .2s;position:relative;}

.logo-mark{width:50px;height:50px;display:inline-flex;align-items:center;justify-content:center;border-radius:14px;background:#ff4d6d;box-shadow:none !important;position:relative;z-index:1;}
.logo-mark svg{width:32px;height:32px;fill:#fff;filter:none;}
.logo-text{display:flex;flex-direction:column;gap:2px;line-height:1.1;}
.logo-name{font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:#fff;text-shadow:0 6px 16px rgba(0,0,0,.22);}
.logo-subtitle{font-family:'DM Sans',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.72);}
.nav-left ul{display:flex;gap:14px;align-items:center;list-style:none;}
.nav-left > ul button{background:linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.18);color:var(--text);padding:12px 20px;border-radius:999px;transition:all .2s;}
.nav-left > ul button:hover{background:linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.12));}
.nav-left > ul button.active {
  background: linear-gradient(135deg, var(--accent), #ff7e9f);
  color: #07090f;
  border-color: transparent;
  box-shadow: 0 16px 40px rgba(255,77,109,.34);
}
.nav-right { display: flex; align-items: center; gap: 14px; }
.search-container { position: relative; flex: 0 0 300px; width: 300px; display: flex; align-items: center; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); border-radius: 999px; padding: 6px 10px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
.search-input { width: 100%; padding: 12px 50px 12px 16px; background: transparent; border: none; color: var(--text); font-size: .95rem; font-family: 'DM Sans', sans-serif; transition: color .2s, box-shadow .2s; }
.search-input:focus { outline: none; color: #fff; }
.search-btn { position: absolute; right: 10px; background: none; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; padding: 8px; transition: transform .2s, opacity .2s; }
.search-btn:hover { transform: scale(1.1); opacity: .8; }
.search-results { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: rgba(8,12,20,.98); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; max-height: 420px; overflow-y: auto; z-index: 999; padding: 12px 0; box-shadow: 0 20px 60px rgba(0,0,0,.35); backdrop-filter: blur(10px); }
.search-results.hidden { display: none; }
.search-result-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background .2s; }
.search-result-item:hover { background: rgba(255,77,109,.12); }
.search-result-item img { width: 36px; height: 54px; object-fit: cover; border-radius: 4px; }
.search-result-info { flex: 1; min-width: 0; }
.search-result-title { font-size: .85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.search-result-meta { font-size: .75rem; color: var(--muted); }
.cta-button {
  background: linear-gradient(135deg, #246bff, #42e1ff);
  border: none;
  color: white;
  padding: 12px 24px;
  border-radius: 999px;
  font-weight: 600;
  transition: transform .2s;
}
.cta-button:hover { transform: translateY(-1px); filter: saturate(1.1); }
main{padding:calc(var(--nav-h) + 40px) 40px 60px;}
.section{padding:40px 0;}
.section-header{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:24px;}
.section-header h2{font-size:2rem;letter-spacing:.2px;}
.tag{display:inline-flex;align-items:center;background:rgba(255,255,255,.08);color:var(--accent);padding:8px 14px;border-radius:999px;font-size:.9rem;}
.carousel-wrapper{position:relative;display:flex;align-items:center;gap:16px;}
.row{display:flex;gap:18px;overflow-x:auto;overflow-y:hidden;padding:14px 0;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;}
.row::-webkit-scrollbar{display:none;}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);border:none;width:54px;height:54px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--text);font-size:1.85rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s;}
.carousel-arrow:hover{background:rgba(255,255,255,.16);}
.carousel-arrow.prev{left:-24px;}
.carousel-arrow.next{right:-24px;}
.movie-thumb{min-width:240px;max-width:240px;scroll-snap-align:start;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:24px;overflow:visible;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);cursor:default;position:relative;}
.movie-thumb::before{content:'';position:absolute;inset:-12px;border-radius:24px;background:radial-gradient(circle,rgba(255,77,109,.5) 0%,rgba(255,77,109,0) 70%);opacity:0;transition:opacity .3s ease;z-index:0;pointer-events:none;}
.movie-thumb:hover{transform:translateY(-12px) scale(1.04);cursor:default;}
.movie-thumb:hover::before{opacity:1;}
.movie-thumb img{width:100%;height:360px;object-fit:cover;display:block;position:relative;z-index:1;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);border-radius:22px;}
.movie-thumb:hover img{box-shadow:0 32px 64px rgba(0,0,0,.4),0 0 50px rgba(255,77,109,.6),inset 0 0 25px rgba(255,77,109,.25);transform:scale(1.06) rotate(0.5deg);}
.platform-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  color: #fff;
  font-size: .75rem;
  font-weight: 600;
  text-decoration: none;
  transition: transform .2s, box-shadow .2s;
}
.platform-badge:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.badge-arrow {
  font-size: .6rem;
  margin-left: 2px;
}
.platform-badge.netflix { background: #e50914; }
.platform-badge.disney { background: linear-gradient(135deg, #00b4ff, #0050ff); }
.platform-badge.prime { background: #00a8e1; }
.platform-badge.hbo { background: #6f3dff; }
.platform-badge.max { background: #6f3dff; }
.platform-badge.paramount { background: #0063ed; }
.platform-badge.crunch { background: #ff8200; }
.movie-title{padding:14px 14px 6px;font-weight:700;font-size:1rem;line-height:1.3;}
.movie-meta{display:flex;justify-content:space-between;align-items:center;padding:0 14px 14px;font-size:.88rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.movie-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;padding:24px;z-index:4000;}
.movie-modal.active{display:flex;}
.movie-modal__panel{width:min(1080px,100%);max-height:calc(100vh - 80px);overflow-y:auto;background:var(--surface);border-radius:28px;padding:28px;position:relative;}
.movie-modal__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-close{border:none;background:rgba(255,255,255,.08);color:var(--text);font-size:1.6rem;width:42px;height:42px;border-radius:50%;}
.movie-detail{display:grid;grid-template-columns:minmax(320px,360px) 1fr;gap:28px;align-items:start;}
.movie-detail__poster img{width:100%;height:auto;aspect-ratio:2/3;object-fit:cover;border-radius:24px;display:block;}
.movie-detail__info{display:flex;flex-direction:column;gap:18px;}
.movie-detail__title{font-size:2.1rem;margin-bottom:8px;}
.movie-detail__meta{color:var(--muted);margin-bottom:0;font-size:.95rem;}
.movie-detail__summary{line-height:1.8;color:rgba(255,255,255,.85);}
.movie-detail__section h4{font-size:.92rem;color:var(--accent);text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px;}
.platform-list{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;}
.platform-pill{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border-radius:999px;color:#fff;font-size:.9rem;text-decoration:none;transition:transform .2s,background .2s;}
.platform-pill:hover{transform:translateY(-1px);opacity:.95;}
.platform-pill.netflix{background:#e50914;}
.platform-pill.disney{background:linear-gradient(135deg,#00b4ff,#0050ff);}
.platform-pill.prime{background:#00a8e1;}
.platform-pill.hbo{background:#6f3dff;}
.platform-pill.max{background:#6f3dff;}
.platform-pill.paramount{background:#0063ed;}
.platform-pill.crunch{background:#ff8200;}
.badge-arrow{font-size:.75rem;margin-left:2px;}
.catalog-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px;padding:14px 0;}
.catalog-item{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:24px;overflow:visible;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);cursor:default;position:relative;}
.catalog-item::before{content:'';position:absolute;inset:-12px;border-radius:24px;background:radial-gradient(circle,rgba(255,77,109,.4) 0%,rgba(255,77,109,0) 70%);opacity:0;transition:opacity .3s ease;z-index:0;pointer-events:none;}
.catalog-item:hover{transform:translateY(-10px) scale(1.03);}
.catalog-item:hover::before{opacity:1;}
.catalog-item img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;position:relative;z-index:1;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);border-radius:22px;}
.catalog-item:hover img{box-shadow:0 28px 56px rgba(0,0,0,.4),0 0 40px rgba(255,77,109,.5),inset 0 0 20px rgba(255,77,109,.2);transform:scale(1.05) rotate(-0.5deg);}
.catalog-item p{padding:10px 12px 6px;font-weight:700;font-size:.85rem;line-height:1.2;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;}
.catalog-item .movie-meta{display:flex;justify-content:space-between;align-items:center;padding:0 12px 10px;font-size:.78rem;color:var(--muted);}
.catalog-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;z-index:3000;padding:20px;}
.catalog-modal.active{display:block;overflow-y:auto;}
.catalog-modal__container{max-width:1600px;margin:0 auto;background:var(--bg);border-radius:28px;padding:40px;}
.catalog-modal__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;}
.catalog-modal__title{font-size:2rem;letter-spacing:.2px;}
.catalog-modal__close{border:none;background:rgba(255,255,255,.08);color:var(--text);font-size:1.8rem;width:48px;height:48px;border-radius:50%;cursor:default;}
.catalog-modal__close:hover{background:rgba(255,255,255,.16);}
.pagination-container{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:40px;padding-top:30px;border-top:1px solid rgba(255,255,255,.08);}
.pagination-btn{border:none;background:rgba(255,255,255,.08);color:var(--text);padding:10px 16px;border-radius:8px;cursor:default;transition:background .2s;}
.pagination-btn:hover:not(:disabled){background:rgba(255,255,255,.16);}
.pagination-btn:disabled{opacity:.5;cursor:not-allowed;}
.pagination-info{color:var(--muted);font-size:.9rem;margin:0 12px;}
@media (max-width: 1400px){.catalog-grid{grid-template-columns:repeat(6,1fr);}}
@media (max-width: 1000px){.catalog-grid{grid-template-columns:repeat(4,1fr);}}
@media (max-width: 860px){.catalog-grid{grid-template-columns:repeat(3,1fr);}}
@media (max-width: 640px){.catalog-grid{grid-template-columns:repeat(2,1fr);}.catalog-modal__container{padding:20px;}.pagination-btn{padding:8px 12px;font-size:.9rem;}}
@media (max-width: 480px){.nav-left ul{gap:8px;}.nav-left > ul button{padding:8px 12px; font-size: 0.8rem;}}

/* ANIMACIONES MODERNAS */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes shimmer {
  0%, 100% { transform: translateX(-100%); opacity: 0; }
  50% { opacity: 1; }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
  50% { box-shadow: 0 0 0 10px rgba(255, 77, 109, 0); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 20px rgba(255, 77, 109, 0.3); }
  50% { box-shadow: 0 0 40px rgba(255, 77, 109, 0.6); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255, 77, 109, 0.3), inset 0 0 10px rgba(255, 77, 109, 0.1); }
  50% { box-shadow: 0 0 40px rgba(255, 77, 109, 0.6), inset 0 0 20px rgba(255, 77, 109, 0.2); }
}

@keyframes shimmerFlow {
  0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateX(100%) skewX(-20deg); opacity: 0; }
}

@keyframes borderGlow {
  0%, 100% { border-color: rgba(255, 77, 109, 0.3); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
  50% { border-color: rgba(255, 77, 109, 0.8); box-shadow: 0 0 0 8px rgba(255, 77, 109, 0.1); }
}

/* MEJORAR ELEMENTOS CON ANIMACIONES */
nav {
  animation: slideDown 0.6s ease both;
}

.tag {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: fadeIn 0.6s ease-out 0.2s both;
  cursor: pointer;
}

.tag:hover {
  background: rgba(255, 77, 109, 0.15);
  color: #fff;
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(255, 77, 109, 0.2);
}

.carousel-arrow {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 12px 24px rgba(0,0,0,.2);
  position: relative;
  overflow: hidden;
}

.carousel-arrow::before {
  content: '';
  position: absolute;
  inset: 50%;
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255, 77, 109, 0.6) 0%, transparent 70%);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .6s ease, height .6s ease;
}

.carousel-arrow:hover {
  background: rgba(255, 255, 255, 0.16);
  transform: translateY(-50%) scale(1.08);
  box-shadow: 0 18px 40px rgba(255, 77, 109, 0.25), 0 0 30px rgba(255, 77, 109, 0.3);
}

.carousel-arrow:hover::before {
  width: 100px;
  height: 100px;
}

.carousel-arrow:active {
  transform: translateY(-50%) scale(0.96);
}

.movie-thumb {
  animation: fadeUp 0.5s ease-out both;
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.movie-thumb:hover {
  transform: translateY(-12px) scale(1.02);
  box-shadow: 0 32px 64px rgba(255, 77, 109, 0.2);
}

.movie-thumb:active {
  transform: translateY(-8px) scale(0.98);
}

.movie-thumb img {
  transition: all .4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.movie-thumb:hover img {
  transform: scale(1.08);
  filter: brightness(1.1);
}

.cta-button {
  background: linear-gradient(135deg, #246bff, #42e1ff);
  box-shadow: 0 12px 32px rgba(36, 107, 255, 0.3);
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-weight: 600;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.6s ease-out 0.3s both;
}

.cta-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.2);
  transition: left .4s ease;
}

.cta-button:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 48px rgba(36, 107, 255, 0.45);
  filter: saturate(1.15) brightness(1.05);
}

.cta-button:hover::before {
  left: 100%;
}

.cta-button:active {
  transform: translateY(-1px);
}

.modal-close {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  position: relative;
  border: 2px solid rgba(255, 77, 109, 0.2);
  border-radius: 50%;
}

.modal-close::before {
  content: '';
  position: absolute;
  inset: 50%;
  width: 0;
  height: 0;
  background: radial-gradient(circle, rgba(255, 77, 109, 0.5) 0%, transparent 70%);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .6s ease, height .6s ease;
}

.modal-close:hover {
  transform: rotate(90deg) scale(1.15);
  background: rgba(255, 77, 109, 0.15);
  color: #ff4d6d;
  border-color: rgba(255, 77, 109, 0.6);
  box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
}

.modal-close:hover::before {
  width: 80px;
  height: 80px;
}

.catalog-item {
  animation: slideInUp 0.5s ease-out backwards;
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.catalog-item:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 28px 56px rgba(255, 77, 109, 0.25);
  border-color: rgba(255, 77, 109, 0.4);
}

.catalog-modal__close {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.catalog-modal__close:hover {
  transform: scale(1.12) rotate(90deg);
  background: rgba(255, 77, 109, 0.2);
  color: #ff4d6d;
}

.pagination-btn {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.pagination-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 77, 109, 0.1);
  transition: left .3s ease;
}

.pagination-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(255, 77, 109, 0.15);
}

.pagination-btn:hover:not(:disabled)::before {
  left: 100%;
}

.pagination-btn:active:not(:disabled) {
  transform: translateY(0);
}

.search-result-item {
  transition: all .2s ease;
}

.search-result-item:hover {
  background: rgba(255, 77, 109, 0.15);
  transform: translateX(4px);
}

.movie-modal {
  animation: fadeIn 0.3s ease-out;
}

.movie-modal__panel {
  animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.platform-pill {
  transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.platform-pill::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  transition: left .6s ease;
}

.platform-pill:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 12px 24px rgba(0,0,0,.4), 0 0 20px rgba(255,255,255,.2);
  filter: brightness(1.2);
}

.platform-pill:hover::before {
  left: 100%;
}

.platform-pill:active {
  transform: scale(0.98);
}
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <button type="button" class="nav-logo" id="logoButton" aria-label="Ir al inicio">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M32 10 13 54h38L32 10z" opacity=".15" />
          <path d="M32 12 18 52h8.5l5.5-14.5L37.5 52H46L32 12z" />
          <circle cx="32" cy="40" r="4" fill="#fff" />
        </svg>
      </span>
      <span class="logo-text">
        <span class="logo-name">Analytics</span>
      </span>
    </button>
    <ul>
      <li><button type="button" data-target="pagina_principal">Inicio</button></li>
      <li><button type="button" data-target="peliculas">Películas</button></li>
      <li><button type="button" class="active" data-target="series">Series</button></li>
    </ul>
  </div>
  <div class="nav-right">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar serie..." class="search-input">
      <button type="button" class="search-btn" id="searchBtn" aria-label="Buscar">🔍</button>
      <div class="search-results hidden" id="searchResults"></div>
    </div>
    <button type="button" class="cta-button" id="loginButton">Inicia sesión</button>
  </div>
</nav>
<main>
  <section class="section">
    <div class="section-header">
      <h2>Series</h2>
      <span class="tag" id="catalogToggle" style="cursor:default;">Catálogo completo</span>
    </div>
    <div class="carousel-wrapper">
      <button type="button" class="carousel-arrow prev" data-row="seriesRow" aria-label="Series anteriores">‹</button>
      <div class="row" id="seriesRow" aria-label="Catálogo de series"></div>
      <button type="button" class="carousel-arrow next" data-row="seriesRow" aria-label="Series siguientes">›</button>
    </div>
  </section>
</main>
<div class="movie-modal" id="movieModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="movieModalTitle">
  <div class="movie-modal__panel">
    <div class="movie-modal__header">
      <h3 id="movieModalTitle" class="movie-detail__title">Detalle</h3>
      <button type="button" class="modal-close" id="closeMovieModal" aria-label="Cerrar">×</button>
    </div>
    <div class="movie-detail">
      <div class="movie-detail__poster">
        <img id="modalPoster" src="" alt="Portada" loading="lazy">
      </div>
      <div class="movie-detail__info">
        <div class="movie-detail__meta" id="modalMeta"></div>
        <p class="movie-detail__summary" id="modalSummary"></p>
        <div class="movie-detail__section">
          <h4>Dónde verla</h4>
          <div class="platform-list" id="modalPlatforms"></div>
        </div>
        <div class="movie-detail__section">
          <h4>Descripción</h4>
          <p class="movie-detail__summary" id="modalDescription"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="catalog-modal" id="catalogModal">
  <div class="catalog-modal__container">
    <div class="catalog-modal__header">
      <h2 class="catalog-modal__title">Catálogo Completo de Series</h2>
      <button type="button" class="catalog-modal__close" id="closeCatalogModal" aria-label="Cerrar catálogo">×</button>
    </div>
    <div class="catalog-grid" id="catalogGrid"></div>
    <div class="pagination-container">
      <button type="button" class="pagination-btn" id="prevPageBtn">← Anterior</button>
      <span class="pagination-info">
        Página <span id="currentPage">1</span> de <span id="totalPages">1</span>
      </span>
      <button type="button" class="pagination-btn" id="nextPageBtn">Siguiente →</button>
    </div>
  </div>
</div>
<script>
const PELICULAS = [
  { titulo: "Stranger Things", tipo: "serie", genero: "ciencia ficcion", mood: "oscuro", img: "https://image.tmdb.org/t/p/w500/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg", duracion: "serie", score: 8.8, director: "The Duffer Brothers", actores: "Winona Ryder, David Harbour, Finn Wolfhard, Millie Bobby Brown", descripcion: "Un grupo de amigos enfrenta fuerzas sobrenaturales y experimentos secretos en su pueblo mientras buscan a un niño desaparecido.", plataformas: ["netflix"] },
  { titulo: "Loki", tipo: "serie", genero: "superheroes", mood: "divertido", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREcC8ZvGQcG-YuNs_qwr_Jh-Qo0uYysc5Ogw&s", duracion: "serie", score: 8.3, director: "Kate Herron", actores: "Tom Hiddleston, Owen Wilson, Sophia Di Martino", descripcion: "Loki se une a la Agencia de Variación Temporal para reparar el multiverso y descubrir nuevas versiones de sí mismo.", plataformas: ["disney"] },
  { titulo: "The Boys", tipo: "serie", genero: "superheroes", mood: "oscuro", img: "https://i5.walmartimages.com/seo/Boys-Movie-Poster-TV-Series-Quality-Glossy-Print-Photo-Wall-Art-Karl-Urban-Jack-Quaid-Antony-Starr-Sizes-Available-8x10-11x17-16x20-22x28-24x36-27x40_ed3a9e56-eb6a-446c-b60c-32578b7154d1.41c4fdb15d84e46f95b1b3de0021017c.jpeg", duracion: "serie", score: 8.7, director: "Eric Kripke", actores: "Karl Urban, Antony Starr, Dominique McElligott, Erin Moriarty", descripcion: "Un equipo de vigilantes irrumpe en el mundo corrupto de los superhéroes comerciales para exponer sus crímenes.", plataformas: ["prime"] },
  { titulo: "WandaVision", tipo: "serie", genero: "superheroes", mood: "relajado", img: "https://m.media-amazon.com/images/M/MV5BZTMxMmM1ODItMTZiMS00NjI1LWEwODctMjQ4ZjY4ODliNDI0XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg", duracion: "serie", score: 8.0, director: "Matt Shakman", actores: "Elizabeth Olsen, Paul Bettany", descripcion: "Wanda crea una fantasía televisiva perfecta para ocultar su dolor, hasta que su realidad comienza a desmoronarse.", plataformas: ["disney"] },
  { titulo: "Daredevil", tipo: "serie", genero: "superheroes", mood: "oscuro", img: " https://m.media-amazon.com/images/I/51JG-Ta2ZjL.jpg", duracion: "serie", score: 8.5, director: "Steven S. DeKnight", actores: "Charlie Cox, Deborah Ann Woll, Vincent D'Onofrio", descripcion: "Un abogado ciego usa sus sentidos aumentados para combatir el crimen en Hell's Kitchen y enfrentar a la mafia.", plataformas: ["netflix"] },
  { titulo: "Breaking Bad", tipo: "serie", genero: "drama", mood: "oscuro", img: "https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg", duracion: "serie", score: 9.5, director: "Vince Gilligan", actores: "Bryan Cranston, Aaron Paul, Anna Gunn", descripcion: "Un profesor de química se convierte en fabricante de metanfetamina para asegurar el futuro de su familia, mientras cae en un mundo de violencia y traición.", plataformas: ["netflix"] },
  { titulo: "House of the Dragon", tipo: "serie", genero: "fantasia", mood: "intenso", img: "https://image.tmdb.org/t/p/w500/z2yahl2uefxDCl0nogcRBstwruJ.jpg", duracion: "serie", score: 8.3, director: "Miguel Sapochnik", actores: "Paddy Considine, Emma D'Arcy, Matt Smith", descripcion: "Los Targaryen luchan por el trono desde dentro de la familia, con dragones y conspiraciones que amenazan su legado.", plataformas: ["max"] },
  { titulo: "Arcane", tipo: "serie", genero: "fantasia", mood: "emocional", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZlj3rJ9bqOq8xI57VLZr9ttxi7jO5-JKiOg&s", duracion: "serie", score: 8.7, director: "Christian Linke", actores: "Hailee Steinfeld, Ella Purnell, Kevin Alejandro", descripcion: "En una ciudad dividida por magia y tecnología, dos hermanas enfrentan secretos peligrosos y el costo del poder.", plataformas: ["netflix"] },
  { titulo: "The Mandalorian", tipo: "serie", genero: "accion", mood: "intenso", img: "https://image.tmdb.org/t/p/w500/sWgBv7LV2PRoQgkxwlibdGXKz1S.jpg", duracion: "serie", score: 8.8, director: "Jon Favreau", actores: "Pedro Pascal, Gina Carano, Giancarlo Esposito", descripcion: "Un cazarrecompensas solitario protege a un niño misterioso mientras recorre la galaxia y se enfrenta a viejos enemigos.", plataformas: ["disney"] },
  { titulo: "Euphoria", tipo: "serie", genero: "drama", mood: "oscuro", img: "https://media.themoviedb.org/t/p/w500/6Sdm5XwdCnspdEF8fTFx6UJrl7o.jpg", duracion: "serie", score: 8.4, director: "Sam Levinson", actores: "Zendaya, Sydney Sweeney, Hunter Schafer", descripcion: "Adolescentes lidian con adicción, identidad y relaciones intensas en un mundo donde la fama y el dolor se mezclan.", plataformas: ["hbo"] },
  { titulo: "The Witcher", tipo: "serie", genero: "fantasia", mood: "oscuro", img: "https://hips.hearstapps.com/hmg-prod/images/the-witcher-imagenes-y-poster-1562002627.jpeg", duracion: "serie", score: 8.2, director: "Lauren Schmidt Hissrich", actores: "Henry Cavill, Anya Chalotra, Freya Allan", descripcion: "Un cazador de monstruos marcado por el destino viaja por reinos en guerra, enfrentando hechiceras y decisiones que cambiarán el futuro.", plataformas: ["netflix"] },
];

const PLATFORM_LABELS = {
  netflix: "Netflix", disney: "Disney+", prime: "Prime Video", hbo: "HBO", max: "Max", paramount: "Paramount+", crunch: "Crunchyroll"
};

const PLATFORM_URLS = {
  netflix: "https://netflix.com",
  disney: "https://disneyplus.com",
  prime: "https://primevideo.com",
  hbo: "https://hbo.com",
  max: "https://max.com",
  paramount: "https://paramount.com",
  crunch: "https://crunchyroll.com"
};

function renderCarousel(type, rowId) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.innerHTML = '';

  const items = PELICULAS.filter(item => item.tipo === type);
  items.forEach(p => {
    const el = document.createElement('div');
    el.className = 'movie-thumb';
    el.tabIndex = 0;
    const typeLabel = p.tipo === 'serie' ? 'Serie' : 'Película';
    const scoreLabel = p.score ? `<span style="color: var(--accent);">★</span> ${p.score.toFixed(1)}/10` : 'N/A';
    el.innerHTML = `
      <img src="${p.img}" alt="${p.titulo}" loading="lazy">
      <p class="movie-title">${p.titulo}</p>
      <div class="movie-meta">
        <span>${typeLabel}</span>
        <span>${scoreLabel}</span>
      </div>
    `;
    const img = el.querySelector('img');
    if (img) {
      img.onerror = () => {
        img.onerror = null;
        img.src = `https://via.placeholder.com/300x450/111111/ffffff?text=${encodeURIComponent(p.titulo)}`;
      };
    }
    el.addEventListener('click', () => showMovieDetails(p));
    el.addEventListener('keydown', event => {
      if (event.key === 'Enter') showMovieDetails(p);
    });
    row.appendChild(el);
  });
}

function findMovieByTitle(titulo) {
  return PELICULAS.find(movie => movie.titulo === titulo);
}

function showMovieDetails(movie) {
  const modal = document.getElementById('movieModal');
  const title = document.getElementById('movieModalTitle');
  const poster = document.getElementById('modalPoster');
  const summary = document.getElementById('modalSummary');
  const description = document.getElementById('modalDescription');
  const platforms = document.getElementById('modalPlatforms');
  const meta = document.getElementById('modalMeta');

  title.textContent = movie.titulo;
  poster.src = movie.img;
  poster.alt = `Portada de ${movie.titulo}`;
  poster.onerror = () => {
    poster.onerror = null;
    poster.src = `https://via.placeholder.com/300x450/111111/ffffff?text=${encodeURIComponent(movie.titulo)}`;
  };
  summary.innerHTML = `${movie.genero ? movie.genero.toUpperCase() : 'ENTRETENIMIENTO'} · ${movie.duracion ? movie.duracion : 'Duración variable'} · <span style="color: var(--accent);">★</span> ${movie.score ? movie.score.toFixed(1) + '/10' : 'N/A'}`;
  description.innerHTML = `
    <strong>Director:</strong> ${movie.director || 'No disponible'}<br><br>
    <strong>Actores:</strong> ${movie.actores || 'No disponible'}<br><br>
    ${movie.descripcion || 'Descripción no disponible.'}
  `;
  platforms.innerHTML = '';
  meta.textContent = `Disponible en ${movie.plataformas?.length || 'varias'} plataforma(s)`;

  if (movie.plataformas?.length) {
    movie.plataformas.forEach(key => {
      const link = document.createElement('a');
      link.className = `platform-pill ${key}`;
      let href = '#';
      if (key === 'netflix') href = 'https://netflix.com';
      else if (key === 'disney') href = 'https://disneyplus.com';
      else if (key === 'prime') href = 'https://primevideo.com';
      else if (key === 'hbo') href = 'https://hbo.com';
      else if (key === 'max') href = 'https://max.com';
      else if (key === 'paramount') href = 'https://paramount.com';
      else if (key === 'crunch') href = 'https://crunchyroll.com';
      link.href = href;
      link.target = '_blank';
      link.rel = 'noreferrer noopener';
      link.innerHTML = `${PLATFORM_LABELS[key] || key} <span class="badge-arrow">\u25b6</span>`;
      platforms.appendChild(link);
    });
  } else {
    const pill = document.createElement('span');
    pill.className = 'platform-pill';
    pill.textContent = 'Disponible en varias plataformas';
    platforms.appendChild(pill);
  }

  modal.classList.add('active');
  modal.setAttribute('aria-hidden','false');
}

function closeMovieModal() {
  const modal = document.getElementById('movieModal');
  modal.classList.remove('active');
  modal.setAttribute('aria-hidden','true');
}

function scrollSectionRow(rowId, direction) {
  const row = document.getElementById(rowId);
  if (!row) return;
  const distance = row.clientWidth * 0.82;
  row.scrollBy({ left: direction * distance, behavior: 'smooth' });
}

let currentCatalogPage = 1;
const itemsPerPage = 24;

function renderCatalogGrid(page = 1) {
  const type = 'serie';
  const items = PELICULAS.filter(item => item.tipo === type);
  const totalPages = Math.ceil(items.length / itemsPerPage);
  const start = (page - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = items.slice(start, end);

  const grid = document.getElementById('catalogGrid');
  grid.innerHTML = '';
  pageItems.forEach(p => {
    const el = document.createElement('div');
    el.className = 'catalog-item';
    const typeLabel = 'Serie';
    const scoreLabel = p.score ? `<span style="color: var(--accent);">★</span> ${p.score.toFixed(1)}/10` : 'N/A';
    el.innerHTML = `
      <img src="${p.img}" alt="${p.titulo}" loading="lazy">
      <p>${p.titulo}</p>
      <div class="movie-meta">
        <span>${typeLabel}</span>
        <span>${scoreLabel}</span>
      </div>
    `;
    const img = el.querySelector('img');
    if (img) {
      img.onerror = () => {
        img.onerror = null;
        img.src = `https://via.placeholder.com/300x450/111111/ffffff?text=${encodeURIComponent(p.titulo)}`;
      };
    }
    el.addEventListener('click', () => showMovieDetails(p));
    grid.appendChild(el);
  });

  document.getElementById('currentPage').textContent = page;
  document.getElementById('totalPages').textContent = totalPages;
  document.getElementById('prevPageBtn').disabled = page === 1;
  document.getElementById('nextPageBtn').disabled = page === totalPages;
  
  currentCatalogPage = page;
}

function setupSearch() {
  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");
  const searchResults = document.getElementById("searchResults");

  function performSearch() {
    const query = searchInput.value.trim();
    if (query) {
      window.location.href = 'resultados.html?q=' + encodeURIComponent(query);
    }
  }

  searchBtn.addEventListener("click", performSearch);
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") performSearch();
  });

  searchInput.addEventListener("input", (e) => {
    const query = e.target.value.toLowerCase().trim();
    if (query.length < 2) {
      searchResults.classList.add("hidden");
      return;
    }

    const filtered = PELICULAS.filter(p => p.titulo.toLowerCase().includes(query));

    if (filtered.length === 0) {
      searchResults.innerHTML = '<div style="padding:12px 16px; color: var(--muted); font-size:.875rem;">No se encontraron series</div>';
      searchResults.classList.remove("hidden");
      return;
    }

    searchResults.innerHTML = filtered.map(serie => `
      <div class="search-result-item" data-title="${serie.titulo}">
        <img src="${serie.img}" alt="${serie.titulo}" onerror="this.src='https://via.placeholder.com/36x54/111111/ffffff'">
        <div class="search-result-info">
          <div class="search-result-title">${serie.titulo}</div>
          <div class="search-result-meta"><span style="color: var(--accent);">★</span> ${serie.score}</div>
        </div>
      </div>
    `).join("");
    searchResults.classList.remove("hidden");

    searchResults.querySelectorAll(".search-result-item").forEach(item => {
      item.addEventListener("click", () => {
        const serie = PELICULAS.find(p => p.titulo === item.dataset.title);
        if (serie) showMovieDetails(serie);
        searchInput.value = "";
        searchResults.classList.add("hidden");
      });
    });
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-container")) searchResults.classList.add("hidden");
  });
}

function openCatalogModal() {
  currentCatalogPage = 1;
  renderCatalogGrid(1);
  document.getElementById('catalogModal').classList.add('active');
}

function closeCatalogModal() {
  document.getElementById('catalogModal').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', () => {
  renderCarousel('serie', 'seriesRow');
  setupSearch();
  document.querySelectorAll('.carousel-arrow').forEach(button => {
    button.addEventListener('click', () => {
      const rowId = button.dataset.row;
      const direction = button.classList.contains('next') ? 1 : -1;
      scrollSectionRow(rowId, direction);
    });
  });
  const logoButton = document.getElementById('logoButton');
  if (logoButton) logoButton.addEventListener('click', () => { window.location.href = 'pagina_principal.html'; });

  document.getElementById("loginButton")?.addEventListener("click", () => alert("Próximamente..."));

  document.querySelectorAll('nav button[data-target]').forEach(button => {
    button.addEventListener('click', () => {
      const target = button.dataset.target;
      if (target === 'series') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      if (target === 'pagina_principal') window.location.href = 'pagina_principal.html';
      if (target === 'peliculas') { window.location.href = 'peliculas.html'; }
    });
  });
  const closeModalButton = document.getElementById('closeMovieModal');
  if (closeModalButton) closeModalButton.addEventListener('click', closeMovieModal);

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      const movieModal = document.getElementById('movieModal');
      if (movieModal && movieModal.classList.contains('active')) {
        closeMovieModal();
      } else {
        closeCatalogModal();
      }
    }
  });

  const catalogToggle = document.getElementById('catalogToggle');
  if (catalogToggle) catalogToggle.addEventListener('click', openCatalogModal);

  const closeCatalogButton = document.getElementById('closeCatalogModal');
  if (closeCatalogButton) closeCatalogButton.addEventListener('click', closeCatalogModal);

  const prevPageBtn = document.getElementById('prevPageBtn');
  if (prevPageBtn) {
    prevPageBtn.addEventListener('click', () => {
      if (currentCatalogPage > 1) renderCatalogGrid(currentCatalogPage - 1);
    });
  }

  const nextPageBtn = document.getElementById('nextPageBtn');
  if (nextPageBtn) {
    nextPageBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(PELICULAS.filter(i => i.tipo === 'serie').length / itemsPerPage);
      if (currentCatalogPage < totalPages) renderCatalogGrid(currentCatalogPage + 1);
    });
  }
});
</script>
</body>
</html>
