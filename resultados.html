<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados de búsqueda — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
  --bg:       #05070d;
  --surface:  #0c101c;
  --surface2: #151a2e;
  --accent:   #ff4d6d;
  --accent2:  #ff9a3c;
  --text:     #f1f5ff;
  --muted:    #8a93b2;
  --success:  #4ade80;
  --danger:   #ff6b6b;
  --radius:   16px;
  --nav-h:    70px;
}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 15px 15px, rgba(255,77,109,.15) 2px, transparent 2px);
    background-size: 30px 30px;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  button { font: inherit; }

  * {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,77,109,.28) rgba(255,255,255,.05);
  }
  ::-webkit-scrollbar {
    width: 12px;
    height: 12px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(255,255,255,.05);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,77,109,.28);
    border-radius: 999px;
    border: 3px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,77,109,.42);
  }
  ::-webkit-scrollbar-corner {
    background: transparent;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 77, 109, 0.3), inset 0 0 10px rgba(255, 77, 109, 0.1); }
    50% { box-shadow: 0 0 40px rgba(255, 77, 109, 0.6), inset 0 0 20px rgba(255, 77, 109, 0.2); }
  }

  @keyframes shimmerFlow {
    0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%) skewX(-20deg); opacity: 0; }
  }

  @keyframes borderGlow {
    0%, 100% { border-color: rgba(255, 77, 109, 0.3); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
    50% { border-color: rgba(255, 77, 109, 0.8); box-shadow: 0 0 0 8px rgba(255, 77, 109, 0.1); }
  }

  @keyframes floatUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 77, 109, 0.3), inset 0 0 10px rgba(255, 77, 109, 0.1); }
    50% { box-shadow: 0 0 40px rgba(255, 77, 109, 0.6), inset 0 0 20px rgba(255, 77, 109, 0.2); }
  }

  @keyframes shimmerFlow {
    0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%) skewX(-20deg); opacity: 0; }
  }

  @keyframes borderGlow {
    0%, 100% { border-color: rgba(255, 77, 109, 0.3); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
    50% { border-color: rgba(255, 77, 109, 0.8); box-shadow: 0 0 0 8px rgba(255, 77, 109, 0.1); }
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(7,10,18,.92);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(232,201,126,.08);
    z-index: 1000;
    animation: slideDown .6s ease both;
    font-family: 'Poppins', sans-serif;
  }
    .nav-logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 0;
    margin: 0;
    border: none;
    background: transparent !important;
    background-image: none !important;
    box-shadow: none !important;
    appearance: none;
    -webkit-appearance: none;
    outline: none !important;
    cursor: default;
    transition: opacity .2s;
    position: relative;
  }

  
  .logo-mark {
    width: 50px;
    height: 50px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: #ff4d6d;
    box-shadow: none !important;
    position: relative;
    z-index: 1;
  }
  .logo-mark svg {
    width: 32px;
    height: 32px;
    fill: #fff;
    filter: drop-shadow(0 0 0.45rem rgba(255,255,255,.18));
  }
  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    line-height: 1.1;
  }
  .logo-name {
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 6px 16px rgba(0,0,0,.22);
  }
  .logo-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: .72rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,.72);
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 24px;
    flex: 0 0 auto;
  }
  .nav-left > ul {
    display: flex;
    flex-wrap: nowrap;
    gap: 14px;
    align-items: center;
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .nav-left > ul li {
    list-style: none;
  }
  .nav-left > ul li button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .nav-left > ul button {
    background: linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
    border: 1px solid rgba(255,255,255,.18);
    color: var(--text);
    cursor: pointer;
    font-size: .92rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 12px 22px;
    transition: transform .2s, background .2s, color .2s, box-shadow .2s;
    min-width: max-content;
    letter-spacing: .3px;
  }
  .nav-left > ul button:hover {
    background: linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.12));
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 16px 32px rgba(0,0,0,.2);
  }
  .nav-left > ul button:active {
    transform: translateY(1px);
    box-shadow: 0 10px 20px rgba(0,0,0,.2);
  }
  .nav-left > ul button.active {
    background: linear-gradient(135deg, var(--accent), #ff7e9f);
    color: #07090f;
    border-color: transparent;
    box-shadow: 0 16px 40px rgba(255,77,109,.34);
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    justify-content: flex-end;
    margin-left: auto;
  }
  .search-container {
    position: relative;
    flex: 0 0 300px;
    width: 300px;
    display: flex;
    align-items: center;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px;
    padding: 6px 10px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .search-input {
    width: 100%;
    padding: 12px 50px 12px 16px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: .95rem;
    font-family: 'DM Sans', sans-serif;
    transition: color .2s, box-shadow .2s;
  }
  .search-input:focus {
    outline: none;
    color: #fff;
  }
  .search-btn {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 8px;
    transition: transform .2s, opacity .2s;
  }
  .search-btn:hover {
    transform: scale(1.1);
    opacity: .8;
  }
  .search-input::placeholder {
    color: rgba(255,255,255,.65);
  }
  .search-results { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: rgba(8,12,20,.98); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; max-height: 420px; overflow-y: auto; z-index: 999; padding: 12px 0; box-shadow: 0 20px 60px rgba(0,0,0,.35); backdrop-filter: blur(10px); }
  .search-results.hidden { display: none; }
  .search-result-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background .2s; }
  .search-result-item:hover { background: rgba(255,77,109,.12); }
  .search-result-item img { width: 36px; height: 54px; object-fit: cover; border-radius: 4px; }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-title { font-size: .85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-result-meta { font-size: .75rem; color: var(--muted); }
  .cta-button {
    background: linear-gradient(135deg, #246bff, #42e1ff);
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: 999px;
    font-weight: 600;
    font-size: .95rem;
    cursor: pointer;
    transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 20px rgba(36, 107, 255, 0.3);
    flex-shrink: 0;
  }
  .cta-button:hover {
    transform: translateY(-2px);
    filter: saturate(1.2) brightness(1.1);
    box-shadow: 0 12px 32px rgba(36, 107, 255, 0.45);
  }
  .cta-button:active {
    transform: translateY(0);
  }
  main { padding: calc(var(--nav-h) + 40px) 40px 60px; }
  .results-container { max-width: 1400px; margin: 0 auto; }
  .results-header {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
  }
  .results-title {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: .2px;
  }
  .results-subtitle {
    font-size: 1rem;
    color: var(--muted);
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }
  .result-card {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all .3s ease;
    position: relative;
  }

  .result-card::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 16px;
    background: radial-gradient(circle, rgba(255, 77, 109, 0.3) 0%, rgba(255, 77, 109, 0) 70%);
    opacity: 0;
    transition: opacity .3s ease;
    z-index: 0;
    pointer-events: none;
  }

  .result-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,0,0,.3), 0 0 30px rgba(255,77,109,.3);
    border-color: rgba(255,255,255,.2);
  }

  .result-card:hover::before {
    opacity: 1;
  }

  .result-card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    position: relative;
    z-index: 1;
    transition: all .3s ease;
    display: block;
  }

  .result-card:hover img {
    transform: scale(1.05);
    filter: brightness(1.1);
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
  }
  .result-info {
    padding: 14px;
  }
  .result-title {
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .result-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: .88rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .no-results {
    text-align: center;
    padding: 80px 40px;
  }
  .no-results-icon {
    font-size: 4rem;
    margin-bottom: 20px;
  }
  .no-results-title {
    font-size: 1.8rem;
    margin-bottom: 12px;
  }
  .no-results-text {
    font-size: 1rem;
    color: var(--muted);
  }
  .movie-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 2000;
  }
  .movie-modal.active {
    display: flex;
  }
  .movie-modal__panel {
    width: min(1080px, 100%);
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    background: var(--surface);
    border-radius: 28px;
    padding: 28px;
    position: relative;
  }
  .movie-modal__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-close {
    border: none;
    background: rgba(255,255,255,.08);
    color: var(--text);
    font-size: 1.6rem;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    transition: background .2s;
  }
  .modal-close:hover {
    background: rgba(255,255,255,.16);
  }
  .movie-detail {
    display: grid;
    grid-template-columns: minmax(320px, 360px) 1fr;
    gap: 28px;
    align-items: start;
  }
  .movie-detail__poster img {
    width: 100%;
    height: auto;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 24px;
    display: block;
  }
  .movie-detail__info {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .movie-detail__title {
    font-size: 2.1rem;
    margin-bottom: 8px;
  }
  .movie-detail__meta {
    color: var(--muted);
    margin-bottom: 0;
    font-size: .95rem;
  }
  .movie-detail__summary {
    line-height: 1.8;
    color: rgba(255,255,255,.85);
  }
  .movie-detail__section h4 {
    font-size: .92rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .18em;
    margin-bottom: 10px;
  }
  .platform-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
  }
  .platform-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    color: #fff;
    font-size: .9rem;
    text-decoration: none;
    transition: transform .2s, background .2s;
  }
  .platform-pill:hover {
    transform: translateY(-1px);
    opacity: .95;
  }
  .platform-pill.netflix { background: #e50914; }
  .platform-pill.disney { background: linear-gradient(135deg, #00b4ff, #0050ff); }
  .platform-pill.prime { background: #00a8e1; }
  .platform-pill.hbo { background: #6f3dff; }
  .platform-pill.max { background: #6f3dff; }
  .platform-pill.paramount { background: #0063ed; }
  .platform-pill.crunch { background: #ff8200; }
  .badge-arrow { font-size: .75rem; margin-left: 2px; }
  
  @media (max-width: 768px) {
    .results-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .movie-detail { grid-template-columns: 1fr; }
  }

  /* ANIMACIONES MODERNAS */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes shimmer {
    0%, 100% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
    50% { box-shadow: 0 0 0 10px rgba(255, 77, 109, 0); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255, 77, 109, 0.3); }
    50% { box-shadow: 0 0 40px rgba(255, 77, 109, 0.6); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MEJORAR ELEMENTOS CON ANIMACIONES */
  nav {
    animation: slideDown 0.6s ease both;
  }

  .platform-pill {
    transition: all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .platform-pill:hover {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 12px 24px rgba(0,0,0,.4);
    filter: brightness(1.1);
  }

  .platform-pill:active {
    transform: scale(0.98);
  }

  .movie-modal {
    animation: fadeIn 0.3s ease-out;
  }

  .movie-modal__panel {
    animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .results-count {
    animation: fadeUp 0.5s ease-out 0.1s both;
  }

  .results-header {
    animation: fadeUp 0.5s ease-out 0.2s both;
  }
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <button type="button" class="nav-logo" id="logoButton" aria-label="Ir al inicio">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M32 10 13 54h38L32 10z" opacity=".15" />
          <path d="M32 12 18 52h8.5l5.5-14.5L37.5 52H46L32 12z" />
          <circle cx="32" cy="40" r="4" fill="#fff" />
        </svg>
      </span>
      <span class="logo-text">
        <span class="logo-name">Analytics</span>
      </span>
    </button>
    <ul>
      <li><button type="button" data-target="index">Inicio</button></li>
      <li><button type="button" data-target="peliculas">Películas</button></li>
      <li><button type="button" data-target="series">Series</button></li>
    </ul>
  </div>
  <div class="nav-right">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar película o serie..." class="search-input">
      <button type="button" class="search-btn" id="searchBtn" aria-label="Buscar">🔍</button>
      <div class="search-results hidden" id="searchResults"></div>
    </div>
    <button type="button" class="cta-button" id="loginButton">Inicia sesión</button>
  </div>
</nav>

<main>
  <div class="results-container">
    <div class="results-header">
      <h1 class="results-title">Resultados de búsqueda</h1>
      <p class="results-subtitle" id="resultsSubtitle"></p>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>
</main>

<div class="movie-modal" id="movieModal">
  <div class="movie-modal__panel">
    <div class="movie-modal__header">
      <h2 id="modalTitle" style="font-size: 1.6rem; margin: 0;"></h2>
      <button type="button" class="modal-close" id="modalClose" aria-label="Cerrar">×</button>
    </div>
    <div class="movie-detail" id="movieDetail"></div>
  </div>
</div>

const PELICULAS = [

  { titulo: "John Wick: Chapter 4", tipo: "pelicula", genero: "accion", mood: "intenso", img: "https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg", duracion: "larga", score: 7.7, director: "Chad Stahelski", actores: "Keanu Reeves, Donnie Yen, Bill Skarsgård", descripcion: "John Wick desafía a la Alta Mesa en una guerra global de asesinos para recuperar su libertad y terminar con su caza interminable.", plataformas: ["netflix", "prime"] },
  { titulo: "John Wick", tipo: "pelicula", genero: "accion", mood: "intenso", img: "https://m.media-amazon.com/images/I/71ucSvBl6pL._AC_UF894,1000_QL80_.jpg", duracion: "media", score: 7.4, director: "Chad Stahelski, David Leitch", actores: "Keanu Reeves, Michael Nyqvist, Alfie Allen", descripcion: "El legendario exasesino regresa de su retiro para vengar a su perro y descubrir que un contrato sobre su vida lo obliga a pelear por su propia supervivencia.", plataformas: ["netflix", "prime"] },

const PLATFORM_LABELS = {
  netflix: "Netflix", disney: "Disney+", prime: "Prime Video", hbo: "HBO", max: "Max", paramount: "Paramount+", crunch: "Crunchyroll"
};

const PLATFORM_URLS = {
  netflix: "https://netflix.com",
  disney: "https://disneyplus.com",
  prime: "https://primevideo.com",
  hbo: "https://hbo.com",
  max: "https://max.com",
  paramount: "https://paramount.com",
  crunch: "https://crunchyroll.com"
};

let currentQuery = '';

document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  currentQuery = params.get('q') || '';
  
  if (currentQuery) {
    document.getElementById('searchInput').value = currentQuery;
    displayResults(currentQuery);
  }

  document.getElementById('logoButton').addEventListener('click', () => window.location.href = 'index.html');
  
  document.querySelectorAll('.nav-left ul button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const target = e.target.dataset.target;
      if (target) window.location.href = target + '.html';
    });
  });

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      performSearch();
    }
  });

  document.getElementById('searchBtn').addEventListener('click', performSearch);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('movieModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('movieModal')) closeModal();
  });
});

function performSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (query) {
    window.location.href = 'resultados.html?q=' + encodeURIComponent(query);
  }
}

function displayResults(query) {
  const resultsGrid = document.getElementById('resultsGrid');
  const subtitle = document.getElementById('resultsSubtitle');
  
  const normalizedQuery = query.toLowerCase();
  const results = PELICULAS.filter(item => 
    item.titulo.toLowerCase().includes(normalizedQuery) ||
    item.director.toLowerCase().includes(normalizedQuery) ||
    item.actores.toLowerCase().includes(normalizedQuery) ||
    item.descripcion.toLowerCase().includes(normalizedQuery)
  );

  if (results.length === 0) {
    resultsGrid.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <h2 class="no-results-title">No se pudo encontrar: "${query}"</h2>
          <p class="no-results-text">Intenta con otros términos de búsqueda</p>
        </div>
      </div>
    `;
    subtitle.textContent = 'Sin resultados para "' + query + '"';
  } else {
    resultsGrid.innerHTML = results.map((item, idx) => {
      return `
      <div class="result-card" onclick="showMovieDetails(${idx}, event)">
        <img src="${item.img}" alt="${item.titulo}" loading="lazy">
        <div class="result-info">
          <p class="result-title">${item.titulo}</p>
          <div class="result-meta">
            <span>${item.tipo === 'serie' ? 'Serie' : 'Película'}</span>
            <span><span style="color: var(--accent);">★</span> ${item.score.toFixed(1)}/10</span>
          </div>
        </div>
      </div>
    `;
    }).join('');
    subtitle.textContent = `Se encontraron ${results.length} resultado${results.length !== 1 ? 's' : ''} para "${query}"`;
  }
  window.currentResults = results;
}

function showMovieDetails(index, event) {
  event.preventDefault();
  const results = window.currentResults || [];
  if (!results[index]) return;
  
  const movie = results[index];
  const modal = document.getElementById('movieModal');
  
  const platformsHTML = movie.plataformas.map(p => {
    let url = '#';
    if (p === 'netflix') url = 'https://netflix.com';
    else if (p === 'disney') url = 'https://disneyplus.com';
    else if (p === 'prime') url = 'https://primevideo.com';
    else if (p === 'hbo') url = 'https://hbo.com';
    else if (p === 'max') url = 'https://max.com';
    else if (p === 'paramount') url = 'https://paramount.com';
    else if (p === 'crunch') url = 'https://crunchyroll.com';
    return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="platform-pill ${p}">${PLATFORM_LABELS[p] || p} <span class="badge-arrow">▶</span></a>`;
  }).join('');

  document.getElementById('modalTitle').textContent = movie.titulo;
  document.getElementById('movieDetail').innerHTML = `
    <div class="movie-detail__poster">
      <img src="${movie.img}" alt="${movie.titulo}">
    </div>
    <div class="movie-detail__info">
      <div class="movie-detail__meta">
        <strong>${movie.tipo === 'serie' ? 'Serie' : 'Película'}</strong> • ${movie.genero} • <span style="color: var(--accent);">★</span> ${movie.score}/10
      </div>
      <div class="movie-detail__meta">Duración: ${movie.duracion === 'serie' ? 'Serie' : movie.duracion}</div>
      <div class="movie-detail__meta"><strong>Director:</strong> ${movie.director}</div>
      <div class="movie-detail__meta"><strong>Elenco:</strong> ${movie.actores}</div>
      <div class="movie-detail__summary">${movie.descripcion}</div>
      <div class="movie-detail__section">
        <h4>Disponible en</h4>
        <div class="platform-list">${platformsHTML}</div>
      </div>
    </div>
  `;
  
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('movieModal').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
